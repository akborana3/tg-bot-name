<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Identity Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style id="dynamic-style"></style>

    <script>
        // TAILWIND CONFIG
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        theme: {
                            bg: 'var(--bg-color)',
                            text: 'var(--text-color)',
                            accent: 'var(--accent-color)',
                            secondary: 'var(--secondary-color)',
                            panel: 'var(--panel-bg)'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* BASE TRANSITIONS */
        body { transition: background 0.5s ease, color 0.5s ease; }
        .input-base { transition: all 0.3s ease; outline: none; }
        
        /* DYNAMIC VARIABLES DEFAULT */
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --accent-color: #00f;
            --secondary-color: #333;
            --panel-bg: rgba(255,255,255,0.1);
            --font-main: 'sans-serif';
            --font-head: 'sans-serif';
        }

        body { font-family: var(--font-main); background-color: var(--bg-color); color: var(--text-color); }
        h1, h2, h3 { font-family: var(--font-head); }

        /* UTILITIES */
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(10px); }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        /* GLITCH ANIMATION (For Broken Theme) */
        @keyframes glitch-anim {
            0% { transform: translate(0) } 20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) } 60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) } 100% { transform: translate(0) }
        }
        .glitch-active { animation: glitch-anim 0.3s infinite; }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">

    <canvas id="bgCanvas"></canvas>

    <div id="app-root" class="relative z-10 w-full min-h-screen flex flex-col">
        </div>

    <script>
        // ==========================================
        // THEME DEFINITIONS
        // ==========================================
        const themes = [
            {
                id: 'hacker',
                name: 'Zero Day',
                fonts: ['https://fonts.googleapis.com/css2?family=VT323&display=swap'],
                css: `
                    :root { --bg-color: #000; --text-color: #0f0; --accent-color: #00ff00; --secondary-color: #003300; --panel-bg: rgba(0,20,0,0.9); --font-main: 'VT323', monospace; --font-head: 'VT323', monospace; }
                    .btn { border: 1px solid #0f0; background: #000; text-transform: uppercase; letter-spacing: 2px; }
                    .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
                    .inp { background: #000; border: 1px solid #0f0; color: #0f0; font-family: 'VT323'; }
                `,
                phrases: { title: 'SYSTEM_ROOT_ACCESS', sub: 'Execute Protocol 8096', submit1: 'INJECT_PAYLOAD [RANK]', submit2: 'OVERRIDE_LANG [SHOW]' },
                renderBg: (ctx, w, h) => {
                    ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
                    ctx.fillStyle = '#0f0'; ctx.font = '15px monospace';
                    for(let i=0; i<w/15; i++) {
                        if(Math.random()>0.975) ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), i*15, Math.random()*h);
                    }
                }
            },
            {
                id: 'rich',
                name: 'Billionaire',
                fonts: ['https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300&display=swap'],
                css: `
                    :root { --bg-color: #0f0f0f; --text-color: #d4af37; --accent-color: #d4af37; --secondary-color: #222; --panel-bg: rgba(20,20,20,0.8); --font-main: 'Lato', sans-serif; --font-head: 'Cinzel', serif; }
                    .btn { background: linear-gradient(45deg, #d4af37, #f9e29c); color: #000; border-radius: 2px; font-weight: bold; border: 1px solid #fff; }
                    .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
                    .inp { background: transparent; border-bottom: 2px solid #d4af37; color: #fff; text-align: center; font-style: italic; }
                    .glass-panel { border: 1px solid #d4af37; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
                `,
                phrases: { title: 'The Executive Suite', sub: 'Redefine Your Digital Asset', submit1: 'Establish Global Rank', submit2: 'Curate Show Name' },
                renderBg: (ctx, w, h) => {
                    const grad = ctx.createLinearGradient(0,0,w,h);
                    grad.addColorStop(0, '#0f0f0f'); grad.addColorStop(1, '#1a1a1a');
                    ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
                    // Gold Dust
                    ctx.fillStyle = '#d4af37';
                    for(let i=0; i<50; i++) {
                        ctx.beginPath(); ctx.arc(Math.random()*w, Math.random()*h, Math.random()*2, 0, Math.PI*2); ctx.fill();
                    }
                }
            },
            {
                id: 'meme',
                name: 'Doge Land',
                fonts: ['https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap'],
                css: `
                    :root { --bg-color: #fffacd; --text-color: #ff00ff; --accent-color: #00ffff; --secondary-color: #ffff00; --panel-bg: rgba(255,255,255,0.9); --font-main: 'Comic Neue', cursive; --font-head: 'Comic Neue', cursive; }
                    .btn { background: #ff00ff; color: #fff; border-radius: 50px; font-size: 1.2rem; border: 4px solid #000; box-shadow: 5px 5px 0px #000; }
                    .btn:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px #000; }
                    .inp { background: #fff; border: 3px dashed #ff00ff; color: #000; padding: 10px; border-radius: 15px; }
                `,
                phrases: { title: 'Much Bot. Very Name.', sub: 'Wow. Such API.', submit1: '🚀 TO THE MOON (Rank)', submit2: '💎 DIAMOND HANDS (Show)' },
                renderBg: (ctx, w, h) => {
                    ctx.fillStyle = '#fffacd'; ctx.fillRect(0,0,w,h);
                    ctx.font = '30px Arial';
                    ctx.fillText('🐶', Math.random()*w, Math.random()*h);
                    ctx.fillText('🚀', Math.random()*w, Math.random()*h);
                }
            },
            {
                id: 'broken',
                name: 'System Failure',
                fonts: ['https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Share+Tech+Mono&display=swap'],
                css: `
                    :root { --bg-color: #1a0000; --text-color: #ff3333; --accent-color: #fff; --secondary-color: #500; --panel-bg: rgba(0,0,0,0.8); --font-main: 'Share Tech Mono', monospace; --font-head: 'Rubik Glitch', display; }
                    body { cursor: crosshair; }
                    .container-box { transform: rotate(1deg); border: 2px solid red; }
                    .btn { background: #300; color: #f00; border: 1px solid #f00; text-decoration: line-through; }
                    .btn:hover { background: #f00; color: #000; text-decoration: none; animation: glitch-anim 0.2s infinite; }
                    .inp { background: #111; border: 1px solid #333; color: #f00; }
                `,
                phrases: { title: 'FATAL_ERROR_404', sub: 'DATA_CORRUPTION_IMMINENT', submit1: 'FORCE_WRITE_RANK', submit2: 'ATTEMPT_RECOVERY_SHOW' },
                renderBg: (ctx, w, h) => {
                    ctx.fillStyle = '#050000'; ctx.fillRect(0,0,w,h);
                    for(let i=0; i<100; i++) {
                        ctx.fillStyle = `rgba(255, 0, 0, ${Math.random()*0.5})`;
                        ctx.fillRect(Math.random()*w, Math.random()*h, Math.random()*50, 2);
                    }
                }
            },
            {
                id: 'boys',
                name: 'Vought Intl',
                fonts: ['https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap'],
                css: `
                    :root { --bg-color: #0b1120; --text-color: #fff; --accent-color: #e11d23; --secondary-color: #1f2937; --panel-bg: rgba(11, 17, 32, 0.95); --font-main: 'Inter', sans-serif; --font-head: 'Anton', sans-serif; }
                    .btn { background: #e11d23; color: #fff; text-transform: uppercase; font-family: 'Anton'; letter-spacing: 1px; clip-path: polygon(10% 0, 100% 0, 100% 80%, 90% 100%, 0 100%, 0 20%); }
                    .btn:hover { background: #fff; color: #e11d23; }
                    .inp { background: #1f2937; border-left: 4px solid #e11d23; color: #fff; }
                    .hero-title { text-shadow: 4px 4px 0px #0047AB; }
                `,
                phrases: { title: 'VOUGHT COMMAND', sub: 'Compound V for your Bot', submit1: 'DEPLOY THE SEVEN (Rank)', submit2: 'MEDIA MANAGEMENT (Show)' },
                renderBg: (ctx, w, h) => {
                    ctx.fillStyle = '#0b1120'; ctx.fillRect(0,0,w,h);
                    // Laser Eyes
                    ctx.strokeStyle = 'rgba(225, 29, 35, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, 0); ctx.lineTo(w, h);
                    ctx.moveTo(w, 0); ctx.lineTo(0, h);
                    ctx.stroke();
                }
            },
            {
                id: 'stranger',
                name: 'Upside Down',
                fonts: ['https://fonts.googleapis.com/css2?family=Benguiat:wght@700&family=Courier+Prime&display=swap'],
                css: `
                    @import url('https://fonts.cdnfonts.com/css/itc-benguiat'); 
                    :root { --bg-color: #000; --text-color: #cf0000; --accent-color: #cf0000; --secondary-color: #111; --panel-bg: rgba(0,0,0,0.85); --font-main: 'Courier Prime', monospace; --font-head: 'ITC Benguiat', serif; }
                    h1 { text-shadow: 0 0 10px #f00, 0 0 20px #f00; letter-spacing: -2px; }
                    .btn { background: transparent; border: 2px solid #cf0000; color: #cf0000; box-shadow: 0 0 15px #cf0000; font-family: 'ITC Benguiat'; font-size: 1.1rem; }
                    .btn:hover { background: #cf0000; color: #000; }
                    .inp { background: #000; border: 1px solid #500; color: #f00; }
                    .glass-panel { border-top: 4px solid #cf0000; }
                `,
                phrases: { title: 'HAWKINS LAB', sub: 'Communicating with the Upside Down', submit1: 'CLOSE GATE (Rank)', submit2: 'SEND MESSAGE (Show)' },
                renderBg: (ctx, w, h) => {
                    ctx.fillStyle = '#050010'; ctx.fillRect(0,0,w,h);
                    // Ash particles
                    ctx.fillStyle = 'rgba(200, 200, 220, 0.5)';
                    for(let i=0; i<100; i++) {
                        ctx.beginPath(); ctx.arc(Math.random()*w, Math.random()*h, Math.random()*1.5, 0, Math.PI*2); ctx.fill();
                    }
                }
            },
            {
                id: 'cyberpunk',
                name: 'Night City',
                fonts: ['https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Teko:wght@500&display=swap'],
                css: `
                    :root { --bg-color: #0d0221; --text-color: #0ff; --accent-color: #f0f; --secondary-color: #240046; --panel-bg: rgba(13,2,33,0.85); --font-main: 'Rajdhani', sans-serif; --font-head: 'Teko', sans-serif; }
                    h1, h2 { text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 0px #0ff, -2px -2px 0px #f0f; }
                    .btn { background: #f0f; color: #0d0221; border: 2px solid #0ff; box-shadow: inset 0 0 10px #0ff, 0 0 15px #f0f; text-transform: uppercase; font-family: 'Teko'; font-size: 1.2rem; }
                    .btn:hover { background: #0ff; color: #0d0221; border-color: #f0f; box-shadow: inset 0 0 10px #f0f, 0 0 15px #0ff; }
                    .inp { background: rgba(36,0,70,0.5); border: 1px solid #f0f; color: #0ff; border-radius: 0; }
                    .glass-panel { border-right: 5px solid #0ff; border-left: 5px solid #f0f; border-radius: 0; clip-path: polygon(5% 0, 100% 0, 100% 95%, 95% 100%, 0 100%, 0 5%); }
                `,
                phrases: { title: 'NETRUNNER ACCESS', sub: 'Jack in to update ICE', submit1: 'UPLOAD RANK', submit2: 'OVERWRITE SHOW' },
                renderBg: (ctx, w, h) => {
                    ctx.fillStyle = '#0d0221'; ctx.fillRect(0,0,w,h);
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
                    ctx.lineWidth = 1;
                    // Grid lines
                    for(let i=0; i<w; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
                    for(let i=0; i<h; i+=40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
                    // Neon rain
                    ctx.fillStyle = 'rgba(255, 0, 255, 0.6)';
                    for(let i=0; i<20; i++) { ctx.fillRect(Math.random()*w, Math.random()*h, 2, Math.random()*100 + 20); }
                }
            },
            {
                id: 'synthwave',
                name: 'Retro 84',
                fonts: ['https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Varela+Round&display=swap'],
                css: `
                    :root { --bg-color: #2b003a; --text-color: #ff9a00; --accent-color: #d902ee; --secondary-color: #1a0024; --panel-bg: rgba(26,0,36,0.9); --font-main: 'Varela Round', sans-serif; --font-head: 'Permanent Marker', cursive; }
                    h1, h2 { color: #ff9a00; text-shadow: 0 0 10px #ff9a00, 0 0 20px #ff9a00, 0 0 30px #d902ee; }
                    .btn { background: linear-gradient(180deg, #d902ee, #ff9a00); color: #fff; border: 2px solid #fff; border-radius: 10px; box-shadow: 0 5px 15px rgba(217,2,238,0.5); text-shadow: 1px 1px 2px #000; }
                    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,154,0,0.7); }
                    .inp { background: #1a0024; border: 2px solid #d902ee; color: #0ff; border-radius: 8px; }
                    .glass-panel { background: linear-gradient(135deg, rgba(43,0,58,0.9), rgba(26,0,36,0.9)); border: 1px solid #d902ee; box-shadow: 0 0 40px rgba(217,2,238,0.3); }
                `,
                phrases: { title: 'VAPORWAVE DECK', sub: 'Aesthetic Bot Configurations', submit1: 'SET HIGH SCORE', submit2: 'CHANGE TRACK' },
                renderBg: (ctx, w, h) => {
                    const grad = ctx.createLinearGradient(0,0,0,h);
                    grad.addColorStop(0, '#10002b'); grad.addColorStop(0.6, '#3c096c'); grad.addColorStop(1, '#ff9e00');
                    ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);

                    // Sun
                    ctx.fillStyle = '#ff9e00';
                    ctx.beginPath(); ctx.arc(w/2, h*0.7, 100, 0, Math.PI*2); ctx.fill();

                    // Horizon Grid
                    ctx.strokeStyle = 'rgba(217, 2, 238, 0.5)';
                    ctx.lineWidth = 2;
                    const horizon = h * 0.7;
                    for(let i=0; i<w; i+=50) { ctx.beginPath(); ctx.moveTo(w/2, horizon); ctx.lineTo(i, h); ctx.stroke(); }
                    for(let i=horizon; i<h; i+=(h-i)*0.1) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
                }
            },
            {
                id: 'matrix',
                name: 'The Construct',
                fonts: ['https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap'],
                css: `
                    :root { --bg-color: #000; --text-color: #00ff41; --accent-color: #008f11; --secondary-color: #003b00; --panel-bg: rgba(0,20,0,0.8); --font-main: 'Inconsolata', monospace; --font-head: 'Inconsolata', monospace; }
                    body { text-shadow: 0 0 5px #00ff41; }
                    .btn { background: #003b00; color: #00ff41; border: 1px solid #00ff41; font-weight: bold; border-radius: 0; }
                    .btn:hover { background: #008f11; color: #000; box-shadow: 0 0 10px #00ff41; }
                    .inp { background: #001100; border: 1px solid #008f11; color: #00ff41; font-family: 'Inconsolata'; }
                    .glass-panel { border: 1px solid #008f11; background: rgba(0,0,0,0.9); }
                `,
                phrases: { title: 'ZION MAINFRAME', sub: 'Wake up, Neo...', submit1: 'LOAD PROTOCOL', submit2: 'ALTER REALITY' },
                renderBg: (ctx, w, h) => {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#00ff41'; ctx.font = '16px Inconsolata';

                    if(!window.matrixDrops) {
                        window.matrixDrops = Array(Math.floor(w/16)).fill(1);
                    }
                    if(window.matrixDrops.length !== Math.floor(w/16)) {
                        window.matrixDrops = Array(Math.floor(w/16)).fill(1);
                    }

                    for(let i=0; i<window.matrixDrops.length; i++) {
                        const char = String.fromCharCode(0x30A0 + Math.random() * 96);
                        ctx.fillText(char, i*16, window.matrixDrops[i]*16);
                        if(window.matrixDrops[i]*16 > h && Math.random() > 0.975) window.matrixDrops[i] = 0;
                        window.matrixDrops[i]++;
                    }
                }
            },
            {
                id: 'space',
                name: 'Deep Space',
                fonts: ['https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Exo+2:wght@300&display=swap'],
                css: `
                    :root { --bg-color: #030014; --text-color: #e0e0e0; --accent-color: #00e5ff; --secondary-color: #1a1a2e; --panel-bg: rgba(10,10,25,0.7); --font-main: 'Exo 2', sans-serif; --font-head: 'Orbitron', sans-serif; }
                    h1, h2 { letter-spacing: 3px; font-weight: 900; }
                    .btn { background: transparent; color: #00e5ff; border: 2px solid #00e5ff; border-radius: 20px; transition: all 0.3s; }
                    .btn:hover { background: #00e5ff; color: #030014; box-shadow: 0 0 20px #00e5ff; transform: scale(1.05); }
                    .inp { background: rgba(0,0,0,0.5); border: 1px solid #1a1a2e; border-bottom: 2px solid #00e5ff; color: #fff; border-radius: 5px; }
                    .glass-panel { backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,229,255,0.1); }
                `,
                phrases: { title: 'STELLAR COMMAND', sub: 'Navigating the Cosmos', submit1: 'WARP JUMP (Rank)', submit2: 'TRANSMIT SIGNAL (Show)' },
                renderBg: (ctx, w, h) => {
                    ctx.fillStyle = '#030014'; ctx.fillRect(0,0,w,h);

                    if(!window.stars) {
                        window.stars = [];
                        for(let i=0; i<150; i++) {
                            window.stars.push({x: Math.random()*w, y: Math.random()*h, r: Math.random()*2, s: Math.random()*0.5});
                        }
                    }

                    ctx.fillStyle = '#fff';
                    window.stars.forEach(star => {
                        ctx.beginPath(); ctx.arc(star.x, star.y, star.r, 0, Math.PI*2); ctx.fill();
                        star.x -= star.s;
                        if(star.x < 0) { star.x = w; star.y = Math.random()*h; }
                    });

                    // Nebula effect
                    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/1.5);
                    grad.addColorStop(0, 'rgba(0, 229, 255, 0.05)');
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
                }
            }
        ];

        // ==========================================
        // LAYOUT GENERATORS
        // ==========================================
        function getLayout(theme) {
            return `
            <nav class="w-full p-6 flex justify-between items-center z-50">
                <div class="text-2xl font-bold tracking-widest ${theme.id === 'broken' ? 'glitch-active' : ''} ${theme.id === 'boys' ? 'hero-title' : ''}">${theme.phrases.title}</div>
                <div class="text-xs md:text-sm opacity-70 font-mono" id="clock">00:00:00</div>
            </nav>

            <main class="flex-grow flex items-center justify-center p-4">
                <div class="glass-panel w-full max-w-3xl p-8 md:p-12 rounded-xl relative overflow-hidden container-box">
                    
                    <div class="mb-10 text-center">
                        <h2 class="text-4xl md:text-5xl mb-2 font-bold" style="color: var(--accent-color)">${theme.name.toUpperCase()} MODE</h2>
                        <p class="opacity-70 text-lg">${theme.phrases.sub}</p>
                    </div>

                    <div class="grid gap-6">
                        <div class="relative group">
                            <label class="block text-xs uppercase tracking-widest mb-1 opacity-50">Identity Token</label>
                            <input type="password" id="botToken" placeholder="8096...:AAF..." class="inp w-full p-4 rounded text-lg outline-none focus:ring-2 focus:ring-[var(--accent-color)]">
                        </div>

                        <div class="grid grid-cols-4 gap-1 md:gap-2">
                            <button onclick="setMode('name')" id="btn-name" class="py-2 opacity-100 border-b-2 border-[var(--accent-color)] text-sm md:text-base">Name</button>
                            <button onclick="setMode('desc')" id="btn-desc" class="py-2 opacity-50 text-sm md:text-base">Desc</button>
                            <button onclick="setMode('about')" id="btn-about" class="py-2 opacity-50 text-sm md:text-base">About</button>
                            <button onclick="setMode('photo')" id="btn-photo" class="py-2 opacity-50 text-sm md:text-base">Photo</button>
                        </div>

                        <div class="relative">
                            <label class="block text-xs uppercase tracking-widest mb-1 opacity-50" id="input-label">NEW NAME</label>
                            <textarea id="mainInput" rows="3" class="inp w-full p-4 rounded text-xl" placeholder="Enter new value..."></textarea>
                            <input type="file" id="imageFile" accept=".jpg, .jpeg, .png" class="inp w-full p-4 rounded text-xl" style="display: none;">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                            <button onclick="executeAction('rank')" class="btn py-4 px-6 rounded transition-all font-bold">
                                ${theme.phrases.submit1}
                            </button>
                            <button onclick="executeAction('show')" class="btn py-4 px-6 rounded transition-all font-bold">
                                ${theme.phrases.submit2}
                            </button>
                        </div>
                    </div>

                    <div class="mt-8 bg-black/50 p-4 rounded font-mono text-xs h-32 overflow-y-auto border border-white/10" id="console">
                        <div class="opacity-50">> System Ready...</div>
                        <div class="opacity-50">> Theme: ${theme.id.toUpperCase()} loaded.</div>
                    </div>
                </div>
            </main>

            <footer class="p-6 text-center z-10">
                <div class="text-sm opacity-50 mb-2">
                    <a href="http://ajitdoval.netlify.app" class="underline hover:text-[var(--accent-color)]">t.me/DefMinindia</a>
                </div>
                <div class="text-xs opacity-40 uppercase tracking-widest border-t border-gray-700 pt-2 inline-block">
                    ⚠️ BUY A COFFEE FOR HIM CLICK HERE
                </div>
            </footer>
            `;
        }

        // ==========================================
        // APP LOGIC
        // ==========================================
        let currentTheme = null;
        let editMode = 'name';

        const apiMap = {
            name: { endpoint: 'setMyName', param: 'name', label: 'NEW NAME' },
            desc: { endpoint: 'setMyDescription', param: 'description', label: 'DESCRIPTION (Start)' },
            about: { endpoint: 'setMyShortDescription', param: 'short_description', label: 'ABOUT (Bio)' },
            photo: { endpoint: 'setMyProfilePhoto', param: 'photo', label: 'NEW PROFILE PHOTO' }
        };

        window.onload = function() {
            // 1. Pick Random Theme
            const rnd = Math.floor(Math.random() * themes.length);
            currentTheme = themes[rnd];
            
            // 2. Inject CSS & Fonts
            const styleEl = document.getElementById('dynamic-style');
            const fontImports = currentTheme.fonts.map(f => `@import url('${f}');`).join('\n');
            styleEl.innerHTML = `${fontImports}\n${currentTheme.css}`;

            // 3. Inject HTML
            document.getElementById('app-root').innerHTML = getLayout(currentTheme);

            // 4. Start Canvas Animation
            initCanvas();

            // 5. Start Clock
            setInterval(() => {
                const now = new Date();
                const time = now.toLocaleTimeString();
                const el = document.getElementById('clock');
                if(el) el.innerText = time;
            }, 1000);

            console.log(`Loaded Theme: ${currentTheme.name}`);
        };

        function setMode(mode) {
            editMode = mode;
            
            // Reset opacity and styling
            ['name','desc','about', 'photo'].forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                if(btn) {
                    btn.style.opacity = m === mode ? '1' : '0.5';
                    btn.style.borderBottom = m === mode ? '2px solid var(--accent-color)' : 'none';
                }
            });
            
            document.getElementById('input-label').innerText = apiMap[mode].label;

            // Toggle Input vs File manually to preserve your layout bounds
            if(mode === 'photo') {
                document.getElementById('mainInput').style.display = 'none';
                document.getElementById('imageFile').style.display = 'block';
            } else {
                document.getElementById('mainInput').style.display = 'block';
                document.getElementById('imageFile').style.display = 'none';
            }
        }

        function log(msg, isError = false) {
            const con = document.getElementById('console');
            const div = document.createElement('div');
            div.style.color = isError ? '#ff5555' : 'inherit';
            div.innerText = `> ${msg}`;
            con.prepend(div);

            // Also show SweetAlert2 toast
            Swal.fire({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true,
                icon: isError ? 'error' : 'success',
                title: msg,
                background: 'var(--panel-bg)',
                color: 'var(--text-color)'
            });
        }

        async function executeAction(type) {
            const token = document.getElementById('botToken').value.trim();

            if(!token) {
                log('ERROR: Token Missing', true);
                return;
            }

            const conf = apiMap[editMode];
            log(`Sending ${conf.endpoint} [${type.toUpperCase()}]...`);

            try {
                let res;

                if (editMode === 'photo') {
                    // Profile Photo Upload Logic
                    const file = document.getElementById('imageFile').files[0];
                    
                    if (!file) {
                        log('ERROR: Image file is required.', true);
                        return;
                    }

                    const formData = new FormData();
                    formData.append('photo', file);

                    res = await fetch(`https://api.telegram.org/bot${token}/${conf.endpoint}`, {
                        method: 'POST',
                        body: formData
                    });

                } else {
                    // Standard Text Updates Logic
                    const val = document.getElementById('mainInput').value;
                    const payload = { [conf.param]: val };

                    // Rank = Global (No Lang), Show = En (Lang 'en')
                    if(type === 'show') {
                        payload['language_code'] = 'en';
                    }

                    res = await fetch(`https://api.telegram.org/bot${token}/${conf.endpoint}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });
                }
                
                const data = await res.json();
                
                if(data.ok) {
                    log('SUCCESS: Updated.', false);
                    log(JSON.stringify(data.result));
                } else {
                    log(`API ERROR: ${data.description}`, true);
                }
            } catch(e) {
                log(`NET ERROR: ${e.message}`, true);
            }
        }

        // ==========================================
        // CANVAS ENGINE
        // ==========================================
        function initCanvas() {
            const c = document.getElementById('bgCanvas');
            const ctx = c.getContext('2d');
            
            const resize = () => {
                c.width = window.innerWidth;
                c.height = window.innerHeight;
            };
            window.addEventListener('resize', resize);
            resize();

            const animate = () => {
                // Clear with fade for some effects, or solid for others
                if(currentTheme.id === 'hacker') {
                    ctx.fillStyle = 'rgba(0,0,0,0.05)'; // Trail effect
                    ctx.fillRect(0,0,c.width,c.height);
                } else {
                    ctx.clearRect(0,0,c.width,c.height);
                }
                
                // Draw Theme Specific BG
                currentTheme.renderBg(ctx, c.width, c.height);
                
                requestAnimationFrame(animate);
            };
            animate();
        }

    </script>
</body>
</html>

    async function executeAction(type) {
      const token = document.getElementById('botToken').value.trim(); // optional token from user
      const val = document.getElementById('mainInput').value;
      if(!val) {
        log('ERROR: Input is empty', true);
        return;
      }

      const conf = apiMap[editMode];
      const payload = { [conf.param]: val };

      if(type === 'show') payload['language_code'] = 'en';

      // Build body for serverless function
      const body = {
        endpoint: conf.endpoint,
        payload,
        // optional: include token if user wants to run against their personal bot.
        // Strongly recommended: avoid passing tokens from client in public deployments.
        ...(token ? { token } : {}),
        logToChannel: true
      };

      log(`Proxying ${conf.endpoint} => /api/telegram ...`);

      try {
        const r = await fetch('/api/telegram', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await r.json();
        if (data && data.ok) {
          log('SUCCESS: Updated.');
          log(JSON.stringify(data.result));
        } else {
          log(`API ERROR: ${data && data.description ? data.description : JSON.stringify(data)}`, true);
        }
      } catch (e) {
        log(`NET ERROR: ${e.message}`, true);
      }
    }
